services:
  mysql:
    image: mysql:8.4
    container_name: a9-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${A9_MYSQL_DATABASE:-a9}
      MYSQL_USER: ${A9_MYSQL_USER:-a9}
      MYSQL_PASSWORD: ${A9_MYSQL_PASSWORD:-a9_dev_password}
      MYSQL_ROOT_PASSWORD: ${A9_MYSQL_ROOT_PASSWORD:-a9_root_password}
    ports:
      - "${A9_MYSQL_PORT:-33069}:3306"
    volumes:
      - a9-mysql-data:/var/lib/mysql
      - ./infra/mysql/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${A9_MYSQL_USER:-a9} -p${A9_MYSQL_PASSWORD:-a9_dev_password} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis/redis-stack-server:7.4.0-v8
    container_name: a9-redis
    restart: unless-stopped
    environment:
      REDIS_ARGS: "--appendonly yes"
    ports:
      - "${A9_REDIS_PORT:-63799}:6379"
    volumes:
      - a9-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  a9-mysql-data:
  a9-redis-data:
